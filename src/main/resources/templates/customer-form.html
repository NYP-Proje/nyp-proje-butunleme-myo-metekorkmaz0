<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Müşteri Kayıt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Müşteri Bilgileri Formu</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/customers/save}" th:object="${customer}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label">Müşteri Adı Soyadı</label>
                            <input type="text" th:field="*{name}" class="form-control" required placeholder="Örn: Mete Korkmaz">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Firma Unvanı</label>
                            <input type="text" th:field="*{companyName}" class="form-control" placeholder="Örn: Bilişim A.Ş.">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">E-Posta Adresi</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Telefon Numarası</label>
                            <input type="text" th:field="*{phone}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Müşteri Durumu</label>
                            <select th:field="*{status}" class="form-select">
                                <option value="ACTIVE">Aktif Müşteri</option>
                                <option value="LEAD">Potansiyel (Lead)</option>
                                <option value="PASSIVE">Pasif</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Kaydet</button>
                            <a th:href="@{/customers}" class="btn btn-secondary">Listeye Dön</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
