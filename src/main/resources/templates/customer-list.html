<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kurumsal CRM - Müşteri Listesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row">
        <div class="col-md-12">
            <h2 class="text-primary mb-4">Kurumsal Müşteri Yönetimi</h2>
            <a th:href="@{/customers/new}" class="btn btn-success mb-3">+ Yeni Müşteri Ekle</a>

            <table class="table table-bordered table-striped bg-white">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Müşteri Adı</th>
                    <th>Firma Adı</th>
                    <th>E-Posta</th>
                    <th>Telefon</th>
                    <th>Durum</th>
                    <th>İşlemler</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer : ${customers}">
                    <td th:text="${customer.id}"></td>
                    <td th:text="${customer.name}"></td>
                    <td th:text="${customer.companyName}"></td>
                    <td th:text="${customer.email}"></td>
                    <td th:text="${customer.phone}"></td>
                    <td>
                        <span class="badge bg-info" th:text="${customer.status}"></span>
                    </td>
                    <td>
                        <a th:href="@{/customers/edit/{id}(id=${customer.id})}" class="btn btn-sm btn-warning">Düzenle</a>
                        <a th:href="@{/customers/delete/{id}(id=${customer.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Bu müşteriyi silmek istediğinize emin misiniz?');">Sil</a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>

</body>
</html>
