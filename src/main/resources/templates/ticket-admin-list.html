<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRM Admin - Teknik Destek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-danger mb-4">Müşteri Teknik Destek Paneli (Admin)</h2>
    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Firma / Müşteri</th>
            <th>Talep Başlığı</th>
            <th>Açıklama</th>
            <th>Öncelik</th>
            <th>Durum</th>
            <th>İşlemler</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ticket : ${tickets}">
            <td th:text="${ticket.id}"></td>
            <td th:text="${ticket.customer.companyName + ' / ' + ticket.customer.name}"></td>
            <td th:text="${ticket.title}"></td>
            <td th:text="${ticket.description}"></td>
            <td><span class="badge bg-secondary" th:text="${ticket.priority}"></span></td>
            <td>
                <span th:if="${ticket.status == 'OPEN'}" class="badge bg-danger">AÇIK (BEKLEMEDE)</span>
                <span th:if="${ticket.status == 'IN_PROGRESS'}" class="badge bg-warning text-dark">İŞLEMEDE</span>
                <span th:if="${ticket.status == 'RESOLVED'}" class="badge bg-success">BRANŞ KAPATILDI/ÇÖZÜLDÜ</span>
            </td>
            <td>
                <a th:href="@{/tickets/admin/status/{id}/IN_PROGRESS(id=${ticket.id})}" class="btn btn-sm btn-warning">İşleme Al</a>
                <a th:href="@{/tickets/admin/status/{id}/RESOLVED(id=${ticket.id})}" class="btn btn-sm btn-success">Kapat/Çözüldü</a>
            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/customers}" class="btn btn-secondary">Müşteri Yönetimine Dön</a>
</div>
</body>
</html>
