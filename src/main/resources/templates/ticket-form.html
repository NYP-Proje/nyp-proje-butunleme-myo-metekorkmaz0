<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yeni Destek Talebi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Arıza / Destek Bildirim Formu</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/tickets/customer/{customerId}/save(customerId=${customer.id})}" th:object="${ticket}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Sorunun Kısa Başlığı</label>
                            <input type="text" th:field="*{title}" class="form-control" required placeholder="Örn: Firewall Cihazı kilitlendi">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Detaylı Açıklama</label>
                            <textarea th:field="*{description}" class="form-control" rows="4" required placeholder="Yaşadığınız arıza durumunu detaylandırın..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Aciliyet Durumu</label>
                            <select th:field="*{priority}" class="form-select">
                                <option value="LOW">Düşük (Kritik Değil)</option>
                                <option value="MEDIUM">Orta (İşleyişi Etkiliyor)</option>
                                <option value="HIGH">Yüksek (Sistem Tamamen Kapalı)</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Talebi Gönder</button>
                            <a th:href="@{/tickets/customer/{id}(id=${customer.id})}" class="btn btn-secondary">Vazgeç</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
